spring:
  application:
    name: learning-path-dashboard
  datasource:
    url: jdbc:h2:mem:learning_path_db
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
  web:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:3001,http://localhost:4200,http://127.0.0.1:3000"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

openai:
  api:
    key: sk-proj-demokey123456789abcdefghijklmnopqrstuvwxyz
    url: https://api.openai.com/v1/chat/completions

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.learningpath: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
